      <stop offset="0.4" stop-color="#1E1B4B"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="sc-glow" x1="200" y1="100" x2="900" y2="550" gradientUnits="userSpaceOnUse">
