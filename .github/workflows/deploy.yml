# Deploy Docusaurus to GitHub Pages (org site: react-native-nitro-google-signin.github.io)
# Prerequisite: Settings → Pages → Source: GitHub Actions
# https://github.com/react-native-nitro-google-signin/react-native-nitro-google-signin.github.io/settings/pages
name: Deploy documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs site
        uses: actions/checkout@v4

      - name: Checkout package repo (demo videos)
        uses: actions/checkout@v4
        with:
          repository: react-native-nitro-google-signin/google-signin
          path: package
          sparse-checkout: |
            assets
          sparse-checkout-cone-mode: false

      - name: Sync demo videos
        run: |
          mkdir -p static/video
          cp package/assets/google-signin-android.webm static/video/
          cp package/assets/google-signin-iOS.mov static/video/google-signin-ios.mov

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build site
        env:
          DOCUSAURUS_BASE_URL: /
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
